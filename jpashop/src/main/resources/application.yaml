spring:
  datasource:
    url: jdbc:h2:tcp://localhost/~/jpashop
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create # 실행 시점에 테이블을 drop, 다시 생성
    properties:
      hibernate:
#        show_sql: true # show_sql 옵션은 System.out에 hibernate 실행 SQL을 남김
        format_sql: true

logging.level:
  org.hibernate:
    SQL: debug # logger를 통해 hibernate 실행 SQL을 남김
    orm.jdbc.bind: trace
